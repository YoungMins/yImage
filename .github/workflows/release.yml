name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Download ONNX models
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets/models | Out-Null
          # Replace the URLs below with ones you actually want to ship.
          $u2netp = "https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2netp.onnx"
          $lama   = "https://github.com/enesmsahin/simple-lama-inpainting/releases/download/v0.1.0/lama-fp16.onnx"
          try { Invoke-WebRequest -Uri $u2netp -OutFile assets/models/u2netp.onnx }
          catch { Write-Warning "u2netp download failed: $_" }
          try { Invoke-WebRequest -Uri $lama -OutFile assets/models/lama-fp16.onnx }
          catch { Write-Warning "lama download failed: $_" }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\yImage.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: yImage-Setup
          path: installer/Output/*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
